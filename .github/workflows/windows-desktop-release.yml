name: Windows Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        run: python -m pip install uv

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-windows-installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-course-cards-windows-installer
          path: frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $artifact = Get-ChildItem -Path "frontend/src-tauri/target/release/bundle/nsis/*.exe" -File | Select-Object -First 1
          if (-not $artifact) {
            throw "No NSIS installer artifact found."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title "Video Course Cards $env:RELEASE_TAG" --notes "Local-first desktop demo release."
          }

          gh release upload $env:RELEASE_TAG $artifact.FullName --clobber
